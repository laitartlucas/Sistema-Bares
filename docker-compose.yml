version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pizzaria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pizzaria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pizzaria123}
      POSTGRES_DB: ${POSTGRES_DB:-pizzaria_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pizzaria}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
